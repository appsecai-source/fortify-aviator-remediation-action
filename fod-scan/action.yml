name: Fortify AST Scan (FoD)
description: Run the Fortify AST Scan marketplace action for Fortify on Demand through a reusable, project-neutral wrapper.

inputs:
  fod-url:
    description: Fortify on Demand URL used by fortify/github-action.
    required: false
    default: https://ams.fortify.com
  fod-client-id:
    description: Fortify on Demand client ID.
    required: true
  fod-client-secret:
    description: Fortify on Demand client secret.
    required: true
  fod-tenant:
    description: Fortify tenant name.
    required: false
    default: ""
  fod-release:
    description: Preferred FoD release selector for the underlying FOD_RELEASE environment variable. Can be a numeric release id or a release name like repo:branch.
    required: false
    default: ""
  fod-release-id:
    description: Backward-compatible alias for fod-release. Can be a numeric release id.
    required: false
    default: ""
  do-setup:
    description: Whether to automatically create the FoD application and release and configure static scan settings when they do not exist.
    required: false
    default: "false"
  fod-app-owner:
    description: Optional FoD application owner to pass during automatic application creation. This may be required when authenticating with client credentials.
    required: false
    default: ""
  auto-required-attrs:
    description: Whether automatic FoD setup should attempt to fill required application and release attributes with default values.
    required: false
    default: "false"
  copy-from-release:
    description: Optional FoD release to copy state from when creating a new release.
    required: false
    default: ""
  sast-assessment-type:
    description: Optional SAST assessment type to use during FoD release setup.
    required: false
    default: ""
  do-aviator-audit:
    description: Whether FoD setup should enable Aviator audits on the SAST configuration.
    required: false
    default: "false"
  override-sast-settings:
    description: Whether FoD setup should override existing SAST settings instead of only filling them when missing.
    required: false
    default: "false"
  setup-extra-opts:
    description: Additional raw setup options to pass to the FoD setup-release action.
    required: false
    default: ""
  package-extra-opts:
    description: Optional Fortify packaging options such as build tool selectors.
    required: false
    default: ""
  fcli-bootstrap-version:
    description: Optional fcli bootstrap version, for example v3.15.0, if you want to pin the Fortify AST Scan runtime.
    required: false
    default: ""
  do-wait:
    description: Whether the scan action should wait for FoD processing to finish.
    required: false
    default: "false"
  do-job-summary:
    description: Whether the Fortify action should write a job summary.
    required: false
    default: "false"
  do-export:
    description: Whether to export scan results to GitHub code scanning.
    required: false
    default: "false"
  do-sca-scan:
    description: Whether to include software composition analysis.
    required: false
    default: "true"
  do-pr-comment:
    description: Whether the Fortify action should comment on pull requests.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Validate FoD inputs
      shell: bash
      run: |
        if [ -z "${{ inputs.fod-release }}" ] && [ -z "${{ inputs.fod-release-id }}" ]; then
          echo "Either 'fod-release' or 'fod-release-id' must be provided." >&2
          exit 1
        fi

    - name: Build FoD setup options
      id: setup-opts
      shell: bash
      run: |
        setup_opts=""
        if [ -n "${{ inputs.fod-app-owner }}" ]; then
          setup_opts="$setup_opts --app-owner \"${{ inputs.fod-app-owner }}\""
        fi
        if [ "${{ inputs.auto-required-attrs }}" = "true" ]; then
          setup_opts="$setup_opts --auto-required-attrs"
        fi
        if [ -n "${{ inputs.setup-extra-opts }}" ]; then
          setup_opts="$setup_opts ${{ inputs.setup-extra-opts }}"
        fi
        {
          echo "value<<EOF"
          printf '%s\n' "$setup_opts"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Run Fortify on Demand scan
      uses: fortify/github-action@v3
      env:
        FOD_URL: ${{ inputs.fod-url }}
        FOD_CLIENT_ID: ${{ inputs.fod-client-id }}
        FOD_CLIENT_SECRET: ${{ inputs.fod-client-secret }}
        FOD_TENANT: ${{ inputs.fod-tenant }}
        FOD_RELEASE: ${{ inputs.fod-release || inputs.fod-release-id }}
        DO_SETUP: ${{ inputs.do-setup }}
        COPY_FROM_RELEASE: ${{ inputs.copy-from-release }}
        SAST_ASSESSMENT_TYPE: ${{ inputs.sast-assessment-type }}
        DO_AVIATOR_AUDIT: ${{ inputs.do-aviator-audit }}
        OVERRIDE_SAST_SETTINGS: ${{ inputs.override-sast-settings }}
        SETUP_EXTRA_OPTS: ${{ steps.setup-opts.outputs.value }}
        FCLI_BOOTSTRAP_VERSION: ${{ inputs.fcli-bootstrap-version }}
        PACKAGE_EXTRA_OPTS: ${{ inputs.package-extra-opts }}
        DO_SAST_SCAN: "true"
        DO_WAIT: ${{ inputs.do-wait }}
        DO_SAST_WAIT: ${{ inputs.do-wait }}
        DO_JOB_SUMMARY: ${{ inputs.do-job-summary }}
        DO_RELEASE_SUMMARY: ${{ inputs.do-job-summary }}
        DO_EXPORT: ${{ inputs.do-export }}
        DO_SAST_EXPORT: ${{ inputs.do-export }}
        DO_SCA_SCAN: ${{ inputs.do-sca-scan }}
        DO_PR_COMMENT: ${{ inputs.do-pr-comment }}

branding:
  icon: shield
  color: blue
